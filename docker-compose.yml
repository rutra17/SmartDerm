services:
  backend:
    build: ./BackEnd
    expose:
      - "3001"      # <--- CORRIGIDO: Agora usa expose como o frontend!
    environment:
      - PORT=3001
    restart: always

  frontend:
    build: ./FrontEnd
    expose:
      - "5173"
    tty: true
    stdin_open: true
    depends_on:
      - backend
    restart: always
