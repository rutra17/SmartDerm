services:
  # ==========================================
  # 1. O SEU FRONT-END (React/Vite)
  # ==========================================
  frontend:
    build: ./FrontEnd
    ports:
      - "5173:5173"
    tty: true          # Mantém o Vite vivo
    stdin_open: true
    depends_on:
      - backend
    restart: always

  # ==========================================
  # 2. O SEU BACK-END (Node.js) - O Novo Maestro
  # ==========================================
  backend:
    build: ./BackEnd
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Preparação para a Fase 2 (Ligação ao PostgreSQL)
      - DATABASE_URL=postgresql://smartderm_user:SenhaForte2026@postgres:5432/smartderm_db
    depends_on:
      - postgres
      - minio
    restart: always

  # ==========================================
  # 3. BASE DE DADOS (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:15-alpine # Versão leve e rápida
    environment:
      POSTGRES_USER: smartderm_user
      POSTGRES_PASSWORD: SenhaForte2026
      POSTGRES_DB: smartderm_db
    ports:
      - "5432:5432" # Porta padrão do PostgreSQL
    volumes:
      - pg_data:/var/lib/postgresql/data # SALVA OS DADOS (Não apaga ao reiniciar)
    restart: always

  # ==========================================
  # 4. STORAGE DE IMAGENS (MinIO - S3)
  # ==========================================
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin_smartderm
      MINIO_ROOT_PASSWORD: SmartDermStorage2026 # Tem de ter no mínimo 8 caracteres
    ports:
      - "9000:9000" # Porta da API (Onde o Back-End vai enviar a foto)
      - "9001:9001" # Porta do Painel Visual (Onde você pode ver as fotos no navegador)
    volumes:
      - minio_data:/data # SALVA AS IMAGENS DEFINITIVAMENTE
    restart: always

# ==========================================
# DISCOS VIRTUAIS (Volumes)
# ==========================================
# Isto garante que, se o servidor for desligado, os seus pacientes e imagens não desaparecem!
volumes:
  pg_data:
  minio_data:

