services:
  backend:
    build: ./BackEnd
    expose:
      - "3000"  
    environment:
      - PORT=3000
    restart: always

  frontend:
    build: ./FrontEnd
    expose:
      - "5173"
    tty: true
    stdin_open: true
    depends_on:
      - backend
    restart: always


