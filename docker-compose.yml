version: '3.8'

services:
  backend:
    build: ./BackEnd
    ports:
      - "3001:3000" # O Docker expõe na 3001 para não conflitar com seu Node local
    env_file:
      - ./BackEnd/.env
    volumes:
      - ./BackEnd:/app

  frontend:
    build: ./FrontEnd
    ports:
      - "8080:5173" # O Docker expõe na 8080 para não conflitar com seu Vite local
    env_file:
      - ./FrontEnd/.env
    volumes:
      - ./FrontEnd:/app
      - /app/node_modules
    depends_on:
      - backend