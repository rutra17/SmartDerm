services:
  # O NOSSO BACK-END
  backend:
    build: ./BackEnd
    ports:
      - "3001:3001" 
    environment:
      - PORT=3001   
    restart: always

  # O NOSSO FRONT-END
  frontend:
    build: ./FrontEnd
    ports:
      - "5173:5173" # <--- A MÁGICA AQUI: Ligando a 8080 do PC à 5173 do Vite
    depends_on:
      - backend     
    restart: always